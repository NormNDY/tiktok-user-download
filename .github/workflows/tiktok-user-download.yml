name: "🎵 TikTok Downloader – Last Resort"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک (عمومی)'
        required: true
      max_videos:
        description: '🔢 تعداد ویدیوها'
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (مثال socks5://1.2.3.4:1080)'
        required: false

jobs:
  tiktok:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: نصب ابزارها
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg curl
          pip3 install -q yt-dlp curl-cffi brotli

      - name: تنظیم پروکسی
        id: proxy
        run: |
          if [ -n "$CUSTOM" ]; then
            echo "proxy=--proxy $CUSTOM" >> $GITHUB_OUTPUT
          else
            docker run -d --name warp -p 1080:1080 --cap-add NET_ADMIN -e WARP_ENABLE_WARP=yes caomingjun/warp
            sleep 25
            if curl -x socks5h://127.0.0.1:1080 -s --max-time 8 https://www.tiktok.com > /dev/null; then
              echo "proxy=--proxy socks5://127.0.0.1:1080" >> $GITHUB_OUTPUT
            else
              echo "proxy=--no-proxy" >> $GITHUB_OUTPUT
            fi
          fi
        env:
          CUSTOM: ${{ github.event.inputs.custom_proxy }}

      - name: دانلود
        run: |
          mkdir -p "raw_tiktok/$USER"
          echo "شروع دانلود..." > "raw_tiktok/$USER/log.txt"
          yt-dlp -v \
            ${{ steps.proxy.outputs.proxy }} \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            -o "raw_tiktok/$USER/%(id)s.%(ext)s" \
            --write-thumbnail --convert-thumbnails jpg \
            --playlist-end $MAX \
            --retries 10 \
            --impersonate chrome \
            "https://www.tiktok.com/@$USER" 2>&1 | tee -a "raw_tiktok/$USER/log.txt"
          echo "تعداد ویدیوها: $(find raw_tiktok/$USER -name '*.mp4' | wc -l)" >> "raw_tiktok/$USER/README.md"
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}

      - name: Push
        run: |
          git add raw_tiktok/
          git diff --cached --quiet || {
            git config user.name "ci" && git config user.email "ci@github.com"
            git commit -m "tiktok @$USER" && git pull --rebase && git push
          }
