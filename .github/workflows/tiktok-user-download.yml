name: "🎵 TikTok Downloader (No Watermark, High Quality) - Debug"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری (بدون @) – برای دانلود آخرین ویدیوها'
        required: false
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوهای کاربر (حداکثر ۲۰)'
        required: false
        default: '10'
        type: choice
        options: ['1', '3', '5', '10', '15', '20']
      single_url:
        description: '🔗 لینک یک ویدیوی تیک‌تاک'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl jq python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ راه‌اندازی WARP (عبور از تحریم)
        run: |
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "WARP_READY=true" >> $GITHUB_ENV
            echo "✅ WARP فعال است"
          else
            echo "WARP_READY=false" >> $GITHUB_ENV
            echo "⚠️ ادامه بدون پروکسی"
          fi

      - name: 📥 دانلود ویدیوهای کاربر
        if: github.event.inputs.tiktok_user != ''
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          PROXY_ARG=""
          if [ "${WARP_READY:-false}" = "true" ]; then
            PROXY_ARG="--proxy socks5://127.0.0.1:1080"
          fi

          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"

          echo "▸ شروع دانلود ${MAX} ویدیوی آخر @${USER} ..."

          set +e
          yt-dlp --verbose \
            $PROXY_ARG \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --no-playlist-reverse \
            --playlist-end "${MAX}" \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee /tmp/tiktok-user.log
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠️ دانلود با خطا مواجه شد. ۲۰ خط آخر لاگ:"
            tail -20 /tmp/tiktok-user.log
          else
            echo "✅ دانلود کامل شد."
          fi

          # شمارش فایل‌های دانلودشده
          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 تعداد فایل‌های دانلودشده: ${DL_COUNT}"

      - name: 📥 دانلود ویدیوی تکی (لینک)
        if: github.event.inputs.single_url != ''
        env:
          SINGLE_URL: ${{ github.event.inputs.single_url }}
        run: |
          set -euo pipefail
          PROXY_ARG=""
          if [ "${WARP_READY:-false}" = "true" ]; then
            PROXY_ARG="--proxy socks5://127.0.0.1:1080"
          fi

          TARGET_DIR="raw_tiktok/single"
          mkdir -p "$TARGET_DIR"

          echo "▸ دانلود ویدیوی تکی: ${SINGLE_URL}"

          set +e
          yt-dlp --verbose \
            $PROXY_ARG \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --no-write-thumbnail \
            --extractor-args "tiktok:no_watermark=1;api_hostname=api16-normal-c-useast1a.tiktokv.com" \
            --user-agent "Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/16.0 Mobile/15E148 Safari/604.1" \
            "${SINGLE_URL}" 2>&1 | tee /tmp/tiktok-single.log
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "⚠️ خطا در دانلود تکی. لاگ:"
            tail -20 /tmp/tiktok-single.log
          else
            echo "✅ دانلود تکی موفق."
          fi
          DL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          echo "📊 فایل‌های موجود: ${DL_COUNT}"

      - name: 🩺 بررسی پوشه raw_tiktok
        run: |
          echo "محتوای پوشه raw_tiktok (در صورت وجود):"
          find raw_tiktok -type f 2>/dev/null || echo "پوشه وجود ندارد."

      - name: 📤 Push فایل‌ها به مخزن
        run: |
          set -x
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          if [ -d "raw_tiktok" ] && [ "$(find raw_tiktok -type f | wc -l)" -gt 0 ]; then
            git add raw_tiktok/
            if ! git diff --cached --quiet; then
              git commit -m "🎵 آپلود ویدیوهای تیک‌تاک"
              git pull --rebase origin main 2>/dev/null || true
              git push origin main
            else
              echo "هیچ فایلی برای commit وجود ندارد."
            fi
          else
            echo "⚠️ پوشه raw_tiktok خالی است یا وجود ندارد. یک فایل placeholder ایجاد می‌شود."
            mkdir -p raw_tiktok
            echo "این فایل به دلیل خالی بودن پوشه ایجاد شده است. لطفاً تنظیمات را بررسی کنید." > raw_tiktok/PLACEHOLDER.md
            git add raw_tiktok/
            git commit -m "افزودن placeholder برای raw_tiktok"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          fi
