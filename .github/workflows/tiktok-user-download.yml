name: "🎵 TikTok Downloader – Full Diagnostic"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک (عمومی)'
        required: true
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوها (حداکثر ۲۰)'
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (اختیاری)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 نصب ابزارها
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp

      - name: 🛡️ تنظیم پروکسی (WARP یا دستی)
        id: proxy
        run: |
          if [ -n "$CUSTOM_PROXY" ]; then
            echo "🔹 پروکسی دستی: $CUSTOM_PROXY"
            echo "proxy_arg=--proxy $CUSTOM_PROXY" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "🛡️ راه‌اندازی WARP..."
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "proxy_arg=--proxy socks5://127.0.0.1:1080" >> $GITHUB_OUTPUT
            echo "✅ WARP فعال"
          else
            echo "proxy_arg=--no-proxy" >> $GITHUB_OUTPUT
            echo "⚠️ WARP کار نمی‌کند"
          fi
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 📥 دانلود ویدیوها (همراه با لاگ کامل)
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"
          LOG_FILE="$TARGET_DIR/debug.log"
          echo "===== شروع دانلود @${USER} در $(date) =====" > "$LOG_FILE"

          PROXY="${{ steps.proxy.outputs.proxy_arg }}"

          STRATEGIES=(
            "1|bestvideo+bestaudio/best|Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15|tiktok:no_watermark=1"
            "2|bestvideo+bestaudio/best|com.zhiliaoapp.musically/2023103030 (Linux; U; Android 13)|"
            "3|best|Mozilla/5.0 (iPhone; CPU iPhone OS 16_0 like Mac OS X) AppleWebKit/605.1.15|"
          )

          for strat in "${STRATEGIES[@]}"; do
            IFS='|' read -r NUM FORMAT UA EXTR <<< "$strat"
            echo "▸ استراتژی $NUM: $FORMAT" | tee -a "$LOG_FILE"
            EXTR_ARG=()
            [ -n "$EXTR" ] && EXTR_ARG=(--extractor-args "$EXTR")

            set +e
            yt-dlp --verbose \
              $PROXY \
              -f "$FORMAT" \
              --merge-output-format mp4 \
              --output "${TARGET_DIR}/%(id)s.%(ext)s" \
              --write-thumbnail --convert-thumbnails jpg \
              --playlist-end "$MAX" \
              --retries 8 \
              --sleep-interval 2 --max-sleep-interval 5 \
              --user-agent "$UA" \
              "${EXTR_ARG[@]}" \
              "https://www.tiktok.com/@${USER}" 2>&1 | tee -a "$LOG_FILE"
            RES=$?
            set -e

            COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
            if [ $COUNT -gt 0 ]; then
              echo "✅ استراتژی $NUM موفق بود ($COUNT ویدیو)" | tee -a "$LOG_FILE"
              break
            fi
            echo "⚠️ استراتژی $NUM شکست خورد (exit=$RES)" | tee -a "$LOG_FILE"
          done

          FINAL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          if [ $FINAL_COUNT -eq 0 ]; then
            printf "# ❌ دانلود ناموفق\n\nهیچ ویدیویی دریافت نشد. دلایل احتمالی:\n1. اکانت خصوصی است\n2. مسدودیت آی‌پی\n3. نام کاربری اشتباه\n\nفایل \`debug.log\` را برای جزئیات بررسی کنید.\n" > "$TARGET_DIR/README.md"
            echo "❌ هیچ ویدیویی دانلود نشد. فایل debug.log برای بررسی ایجاد شد." | tee -a "$LOG_FILE"
          else
            echo "# 🎵 ویدیوهای @${USER}" > "$TARGET_DIR/README.md"
            echo "تعداد: $FINAL_COUNT" >> "$TARGET_DIR/README.md"
            echo "✅ $FINAL_COUNT ویدیو ذخیره شد." | tee -a "$LOG_FILE"
          fi

      - name: 📤 Push پوشه و لاگ‌ها
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add raw_tiktok/
          if ! git diff --cached --quiet; then
            TOTAL=$(find raw_tiktok -name "*.mp4" | wc -l)
            git commit -m "🎵 TikTok @${{ github.event.inputs.tiktok_user }} ($TOTAL ویدیو)"
            git pull --rebase origin main 2>/dev/null || true
            git push origin main
          else
            echo "بدون تغییر"
          fi
