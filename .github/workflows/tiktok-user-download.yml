name: "🎵 TikTok Downloader – Final Robust"

on:
  workflow_dispatch:
    inputs:
      tiktok_user:
        description: '👤 نام کاربری تیک‌تاک (عمومی)'
        required: true
        type: string
      max_videos:
        description: '🔢 تعداد ویدیوها (حداکثر ۲۰)'
        required: true
        default: '3'
        type: choice
        options: ['1', '3', '5', '10', '20']
      custom_proxy:
        description: '🌐 پروکسی دستی (اختیاری)'
        required: false
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  tiktok-download:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 نصب ابزارها و کتابخانه‌های ضروری
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg curl python3-pip
          pip3 install -q yt-dlp
          # کتابخانه‌های لازم برای impersonation (حل مشکل "status code 0")
          pip3 install -q curl-cffi brotli

      - name: 🛡️ تنظیم پروکسی (WARP یا دستی)
        id: proxy
        run: |
          if [ -n "$CUSTOM_PROXY" ]; then
            echo "🔹 پروکسی دستی: $CUSTOM_PROXY"
            echo "proxy_arg=--proxy $CUSTOM_PROXY" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "🛡️ راه‌اندازی WARP..."
          docker run -d --name warp --restart=always \
            -p 1080:1080 --cap-add NET_ADMIN \
            -e WARP_ENABLE_WARP=yes \
            caomingjun/warp
          sleep 25
          if curl -x socks5h://127.0.0.1:1080 -s --max-time 10 https://www.tiktok.com > /dev/null; then
            echo "proxy_arg=--proxy socks5://127.0.0.1:1080" >> $GITHUB_OUTPUT
            echo "✅ WARP فعال"
          else
            echo "proxy_arg=--no-proxy" >> $GITHUB_OUTPUT
            echo "⚠️ WARP پاسخگو نیست، تلاش بدون پروکسی"
          fi
        env:
          CUSTOM_PROXY: ${{ github.event.inputs.custom_proxy }}

      - name: 📥 دانلود ویدیوها (با impersonation)
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
          MAX: ${{ github.event.inputs.max_videos }}
        run: |
          set -euo pipefail
          TARGET_DIR="raw_tiktok/${USER}"
          mkdir -p "$TARGET_DIR"
          LOG_FILE="$TARGET_DIR/debug.log"
          echo "===== شروع دانلود @${USER} در $(date) =====" > "$LOG_FILE"

          PROXY="${{ steps.proxy.outputs.proxy_arg }}"

          # دانلود با impersonation (chrome) برای عبور از بلاک
          yt-dlp --verbose \
            $PROXY \
            -f "bestvideo+bestaudio/best" \
            --merge-output-format mp4 \
            --output "${TARGET_DIR}/%(id)s.%(ext)s" \
            --write-thumbnail --convert-thumbnails jpg \
            --playlist-end "$MAX" \
            --retries 10 \
            --impersonate chrome \
            "https://www.tiktok.com/@${USER}" 2>&1 | tee -a "$LOG_FILE" || {
              echo "⚠️ دانلود با خطا خاتمه یافت. لاگ در $LOG_FILE"
            }

          FINAL_COUNT=$(find "$TARGET_DIR" -name "*.mp4" | wc -l)
          if [ $FINAL_COUNT -eq 0 ]; then
            printf "# ❌ دانلود ناموفق\n\nهیچ ویدیویی دریافت نشد.\nفایل \`debug.log\` را برای جزئیات بررسی کنید.\n" > "$TARGET_DIR/README.md"
            echo "❌ هیچ ویدیویی دانلود نشد." | tee -a "$LOG_FILE"
          else
            echo "# 🎵 ویدیوهای @${USER}" > "$TARGET_DIR/README.md"
            echo "تعداد: $FINAL_COUNT" >> "$TARGET_DIR/README.md"
            echo "✅ $FINAL_COUNT ویدیو ذخیره شد." | tee -a "$LOG_FILE"
          fi

      - name: 📤 Push پوشه و لاگ‌ها (مقاوم در برابر خطا)
        if: always()
        run: |
          set +e
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add raw_tiktok/

          if ! git diff --cached --quiet; then
            TOTAL=$(find raw_tiktok -name "*.mp4" | wc -l)
            git commit -m "🎵 TikTok @${USER} ($TOTAL ویدیو)"
            echo "📤 تلاش برای push..."

            # کشیدن آخرین تغییرات (در صورت تداخل، stash می‌کنیم)
            git stash 2>/dev/null || true
            git pull --rebase origin "${GITHUB_REF_NAME}" || {
              echo "⚠️ خطا در pull، تلاش مستقیم..."
              git rebase --abort 2>/dev/null || true
              git pull origin "${GITHUB_REF_NAME}" --no-rebase || echo "ادامه بدون pull"
            }
            git stash pop 2>/dev/null || true

            # push با ۳ بار تلاش
            for i in 1 2 3; do
              if git push origin "${GITHUB_REF_NAME}"; then
                echo "✅ Push موفق بود"
                break
              else
                echo "⚠️ تلاش $i برای push ناموفق، صبر کنید..."
                sleep 3
              fi
            done || echo "❌ Push با شکست مواجه شد (ویدیوها ممکن است ذخیره نشوند)."
          else
            echo "ℹ️ هیچ تغییری برای commit وجود ندارد."
          fi
          set -e
        env:
          USER: ${{ github.event.inputs.tiktok_user }}
